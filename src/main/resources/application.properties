spring.application.name=worklog

# Database Configuration - Prod (Using Environment Variables)
spring.datasource.url=jdbc:postgresql://localhost:5432/worklog
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration - Prod
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# DevTools Configuration - ENABLE AUTO-RESTART
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

jwt.secret=mysuperlongsecretkeywithatleast32chars!
